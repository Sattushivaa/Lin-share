<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LanDrop Upload</title>
    <link rel="stylesheet" href="frontend.css" />
  </head>
  <body>
    <main class="app">
      <header>
        <p class="eyebrow">LanDrop</p>
        <h1>Secure LAN file upload</h1>
        <p class="sub">Select one or many files, then send them to your desktop in a single batch.</p>
      </header>

      <section class="card">
        <form id="uploadForm" class="upload-form">
          <label for="files" class="file-label">Choose files</label>
          <input id="files" name="files" type="file" multiple required />
          <button id="sendBtn" class="boost" type="submit">Send files</button>
        </form>
        <div class="actions">
          <button id="refreshBtn" class="boost secondary" type="button">Refresh drop folder files</button>
        </div>
        <ul id="filesList" class="files-list"></ul>
        <p id="message" class="message">Waiting for upload.</p>
      </section>
    </main>

    <script src="frontend.js"></script>
  </body>
</html>
