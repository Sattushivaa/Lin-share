<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Focus Flow</title>
    <link rel="stylesheet" href="frontend.css" />
  </head>
  <body>
    <main class="app">
      <header>
        <p class="eyebrow">Daily Momentum</p>
        <h1>Level up your streak</h1>
        <p class="sub">Tiny wins. Fast feedback. Keep the rhythm.</p>
      </header>

      <section class="card">
        <div class="score-wrap">
          <p>Current streak</p>
          <p id="streak" class="score">0</p>
        </div>
        <button id="boostBtn" class="boost">⚡ Complete a micro-task</button>
        <p id="message" class="message">Tap to build momentum.</p>
      </section>
    </main>

    <script src="frontend.js"></script>
  </body>
</html>
